<svg viewBox="0 0 1580 900" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,4 L0,8 Z" fill="#374151"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1580" height="900" fill="#ffffff"/>

  <!-- Title -->
  <text x="790" y="48" text-anchor="middle" font-size="30" font-weight="700" fill="#111827">Simple SIEM — Architecture &amp; Data Flow</text>
  <text x="790" y="80" text-anchor="middle" font-size="16" fill="#6b7280">5 Docker containers. Each stage reads from one Redis queue and writes to the next.</text>

  <!-- ================= STAGE BOXES ================= -->
  <!-- b1 generator -->
  <rect x="30" y="120" width="240" height="220" rx="12" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
  <rect x="30" y="120" width="240" height="44" rx="12" fill="#0891b2"/>
  <text x="150" y="149" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">SIMULATED DEVICES</text>
  <text x="150" y="184" text-anchor="middle" font-size="13" font-style="italic" fill="#0e7490">generator (container)</text>
  <text x="46" y="212" font-size="13" fill="#164e63">Stands in for servers,</text>
  <text x="46" y="232" font-size="13" fill="#164e63">a firewall &amp; a web</text>
  <text x="46" y="252" font-size="13" fill="#164e63">server. Emits raw logs</text>
  <text x="46" y="272" font-size="13" fill="#164e63">in 3 formats plus</text>
  <text x="46" y="292" font-size="13" fill="#164e63">scripted attacks so</text>
  <text x="46" y="312" font-size="13" fill="#164e63">alerts reliably fire.</text>

  <!-- b2 collector -->
  <rect x="350" y="120" width="240" height="220" rx="12" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <rect x="350" y="120" width="240" height="44" rx="12" fill="#16a34a"/>
  <text x="470" y="149" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">STAGE 1 · COLLECTION</text>
  <text x="470" y="184" text-anchor="middle" font-size="13" font-style="italic" fill="#15803d">collector (container)</text>
  <text x="366" y="212" font-size="13" fill="#14532d">Ingests every raw log.</text>
  <text x="366" y="232" font-size="13" fill="#14532d">Wraps it in an envelope:</text>
  <text x="366" y="256" font-size="13" fill="#14532d">• event_id</text>
  <text x="366" y="276" font-size="13" fill="#14532d">• received time</text>
  <text x="366" y="296" font-size="13" fill="#14532d">• source name</text>
  <text x="366" y="320" font-size="13" fill="#14532d">Does not parse contents.</text>

  <!-- b3 normalizer -->
  <rect x="670" y="120" width="240" height="220" rx="12" fill="#fffbeb" stroke="#d97706" stroke-width="2"/>
  <rect x="670" y="120" width="240" height="44" rx="12" fill="#d97706"/>
  <text x="790" y="149" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">STAGE 2 · NORMALIZE</text>
  <text x="790" y="184" text-anchor="middle" font-size="13" font-style="italic" fill="#b45309">normalizer (container)</text>
  <text x="686" y="212" font-size="13" fill="#78350f">Regex-parses each raw</text>
  <text x="686" y="232" font-size="13" fill="#78350f">format into ONE common</text>
  <text x="686" y="252" font-size="13" fill="#78350f">schema so all log types</text>
  <text x="686" y="272" font-size="13" fill="#78350f">look alike: category,</text>
  <text x="686" y="292" font-size="13" fill="#78350f">action, outcome, src_ip,</text>
  <text x="686" y="312" font-size="13" fill="#78350f">user, dst_port, path...</text>

  <!-- b4 correlator -->
  <rect x="990" y="120" width="240" height="220" rx="12" fill="#faf5ff" stroke="#9333ea" stroke-width="2"/>
  <rect x="990" y="120" width="240" height="44" rx="12" fill="#9333ea"/>
  <text x="1110" y="149" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">STAGE 3 · CORRELATE</text>
  <text x="1110" y="184" text-anchor="middle" font-size="13" font-style="italic" fill="#7e22ce">correlator (container)</text>
  <text x="1006" y="212" font-size="13" fill="#581c87">Sliding-window rules</text>
  <text x="1006" y="232" font-size="13" fill="#581c87">across many events:</text>
  <text x="1006" y="256" font-size="13" fill="#581c87">• SSH brute force</text>
  <text x="1006" y="276" font-size="13" fill="#581c87">• port scan</text>
  <text x="1006" y="296" font-size="13" fill="#581c87">• web app scan</text>
  <text x="1006" y="320" font-size="13" fill="#581c87">Raises ALERTS.</text>

  <!-- b5 alerts -->
  <rect x="1310" y="120" width="240" height="220" rx="12" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <rect x="1310" y="120" width="240" height="44" rx="12" fill="#dc2626"/>
  <text x="1430" y="149" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">OUTPUT</text>
  <text x="1430" y="184" text-anchor="middle" font-size="13" font-style="italic" fill="#b91c1c">your console</text>
  <text x="1326" y="212" font-size="13" fill="#7f1d1d">Color-coded alert</text>
  <text x="1326" y="232" font-size="13" fill="#7f1d1d">boxes printed live:</text>
  <text x="1326" y="256" font-size="13" fill="#7f1d1d">• severity</text>
  <text x="1326" y="276" font-size="13" fill="#7f1d1d">• attacker IP</text>
  <text x="1326" y="296" font-size="13" fill="#7f1d1d">• evidence</text>
  <text x="1326" y="316" font-size="13" fill="#7f1d1d">• time</text>

  <!-- ================= ARROWS ================= -->
  <line x1="270" y1="230" x2="348" y2="230" stroke="#374151" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="590" y1="230" x2="668" y2="230" stroke="#374151" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="910" y1="230" x2="988" y2="230" stroke="#374151" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="1230" y1="230" x2="1308" y2="230" stroke="#374151" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- dashed connectors from arrows down to redis queue tags -->
  <line x1="310" y1="242" x2="310" y2="452" stroke="#b91c1c" stroke-width="1.5" stroke-dasharray="4 4"/>
  <line x1="630" y1="242" x2="630" y2="452" stroke="#b91c1c" stroke-width="1.5" stroke-dasharray="4 4"/>
  <line x1="950" y1="242" x2="950" y2="452" stroke="#b91c1c" stroke-width="1.5" stroke-dasharray="4 4"/>

  <!-- ================= REDIS BUS ================= -->
  <rect x="250" y="452" width="760" height="70" rx="14" fill="#7f1d1d"/>
  <text x="630" y="479" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">REDIS — message broker (FIFO queues)</text>
  <text x="630" y="502" text-anchor="middle" font-size="12.5" fill="#fecaca">each stage BRPOPs its input queue and LPUSHes to the next</text>

  <!-- queue name tags sitting where dashed lines meet the bar -->
  <rect x="262" y="444" width="96" height="24" rx="6" fill="#fef2f2" stroke="#b91c1c" stroke-width="1.5"/>
  <text x="310" y="461" text-anchor="middle" font-size="12.5" font-weight="700" fill="#b91c1c">raw_logs</text>
  <rect x="586" y="444" width="88" height="24" rx="6" fill="#fef2f2" stroke="#b91c1c" stroke-width="1.5"/>
  <text x="630" y="461" text-anchor="middle" font-size="12.5" font-weight="700" fill="#b91c1c">collected</text>
  <rect x="912" y="444" width="76" height="24" rx="6" fill="#fef2f2" stroke="#b91c1c" stroke-width="1.5"/>
  <text x="950" y="461" text-anchor="middle" font-size="12.5" font-weight="700" fill="#b91c1c">events</text>

  <!-- ================= EXAMPLE FLOW ================= -->
  <text x="40" y="590" font-size="19" font-weight="700" fill="#111827">How one log is transformed as it flows through the pipeline</text>

  <!-- panel 1 raw -->
  <rect x="40" y="610" width="440" height="240" rx="10" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="60" y="638" font-size="14" font-weight="700" fill="#0891b2">1 · RAW LOG  (auth / SSH syslog)</text>
  <text x="60" y="672" font-size="12.5" font-family="Consolas, monospace" fill="#334155">Jul 18 10:22:01 web01</text>
  <text x="60" y="694" font-size="12.5" font-family="Consolas, monospace" fill="#334155">sshd[4521]: Failed password</text>
  <text x="60" y="716" font-size="12.5" font-family="Consolas, monospace" fill="#334155">for root from 203.0.113.45</text>
  <text x="60" y="738" font-size="12.5" font-family="Consolas, monospace" fill="#334155">port 52344 ssh2</text>
  <text x="60" y="800" font-size="12.5" fill="#64748b">Unstructured text. Every device</text>
  <text x="60" y="820" font-size="12.5" fill="#64748b">uses a different format.</text>

  <!-- arrow -->
  <line x1="490" y1="730" x2="548" y2="730" stroke="#374151" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- panel 2 normalized -->
  <rect x="560" y="610" width="440" height="240" rx="10" fill="#fffbeb" stroke="#d97706" stroke-width="1.5"/>
  <text x="580" y="638" font-size="14" font-weight="700" fill="#b45309">2 · NORMALIZED EVENT  (JSON)</text>
  <text x="580" y="668" font-size="12.5" font-family="Consolas, monospace" fill="#78350f">{</text>
  <text x="592" y="688" font-size="12.5" font-family="Consolas, monospace" fill="#78350f">"event_id": "evt-000042",</text>
  <text x="592" y="708" font-size="12.5" font-family="Consolas, monospace" fill="#78350f">"category": "authentication",</text>
  <text x="592" y="728" font-size="12.5" font-family="Consolas, monospace" fill="#78350f">"action":   "ssh_login",</text>
  <text x="592" y="748" font-size="12.5" font-family="Consolas, monospace" fill="#78350f">"outcome":  "failure",</text>
  <text x="592" y="768" font-size="12.5" font-family="Consolas, monospace" fill="#78350f">"src_ip":   "203.0.113.45",</text>
  <text x="592" y="788" font-size="12.5" font-family="Consolas, monospace" fill="#78350f">"user":     "root"</text>
  <text x="580" y="808" font-size="12.5" font-family="Consolas, monospace" fill="#78350f">}</text>
  <text x="580" y="836" font-size="12.5" fill="#92400e">Same shape for every log type.</text>

  <!-- arrow -->
  <line x1="1010" y1="730" x2="1068" y2="730" stroke="#374151" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- panel 3 alert -->
  <rect x="1080" y="610" width="460" height="240" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="1100" y="638" font-size="14" font-weight="700" fill="#b91c1c">3 · CORRELATED ALERT</text>
  <text x="1100" y="672" font-size="12.5" font-family="Consolas, monospace" font-weight="700" fill="#b91c1c">!!!! ALERT  [HIGH]</text>
  <text x="1100" y="694" font-size="12.5" font-family="Consolas, monospace" font-weight="700" fill="#b91c1c">SSH BRUTE FORCE</text>
  <text x="1100" y="722" font-size="12.5" font-family="Consolas, monospace" fill="#7f1d1d">attacker : 203.0.113.45</text>
  <text x="1100" y="744" font-size="12.5" font-family="Consolas, monospace" fill="#7f1d1d">what     : 5 failed SSH</text>
  <text x="1100" y="764" font-size="12.5" font-family="Consolas, monospace" fill="#7f1d1d">           logins in 30s</text>
  <text x="1100" y="786" font-size="12.5" font-family="Consolas, monospace" fill="#7f1d1d">evidence : user='root'</text>
  <text x="1100" y="826" font-size="12.5" fill="#991b1b">Fires only when MANY events</text>
  <text x="1100" y="844" font-size="12.5" fill="#991b1b">together look malicious.</text>
</svg>
